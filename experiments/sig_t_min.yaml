# Experimental config: t_min_crane reward term (Sig's suggestion).
# Replaces position + crane_velocity with a single physics-grounded signal:
# the optimal bang-bang time for the crane to return to x=0 at rest.
# Weight 0.01 calibrated so max contribution (~0.09 at rail_limit=2) stays
# small relative to the energy term (~1.0 scale).
reward:
  energy: 1.0
  positional: 0.0
  time: 0.0
  position: 0.0
  acceleration: 0.0
  terminal_penalty: -5.0
  angle: 0.0
  angular_velocity: 0.0
  crane_velocity: 0.0
  crane_acceleration: 0.0
  angular_acceleration: 0.0
  t_min_crane: 0.05
training:
  steps: 3000000
  n_envs: 32
  gamma: 0.99
  save_path: models/sig_t_min.zip
  seed: null
  ent_coef: 0.0
  learning_rate: 0.0003
  clip_range: 0.2
  n_steps: 4096
  randomize_start: true
  rail_limit: 2.0
  start_speed: 1.0
  continuous_actions: true
  reward_limit: 50.0
  max_episode_steps: 1500
