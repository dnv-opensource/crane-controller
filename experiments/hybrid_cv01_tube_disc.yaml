# hybrid_cv01 + goal-tube reward config, discrete (bang-bang) action space.
# goal_tube_reward=0.0 — tube reward disabled for discrete variant.
# The pre-tube discrete baseline was already 100% settled; adding goal_tube_reward=0.1
# introduced a high-speed crash regression (7.6% crash rate) by pulling the policy
# toward x=0 in a way the bang-bang action space could not always honour without
# overshooting to the negative rail. Discrete variant uses baseline reward structure.
# terminal_penalty=-5.0 unchanged.
# No early termination — episodes run to max_episode_steps or crash.
reward:
  energy: 1.0
  positional: 0.0
  time: 0.0
  position: 0.1
  acceleration: 0.0
  terminal_penalty: -5.0
  goal_tube_reward: 0.0
  angle: 0.0
  angular_velocity: 0.0
  crane_velocity: -0.1
  crane_acceleration: 0.0
  angular_acceleration: 0.0
  t_min_crane: 0.0
training:
  steps: 3000000
  n_envs: 32
  gamma: 0.99
  save_path: models/hybrid_cv01_tube_disc_s42.zip
  seed: 42
  ent_coef: 0.0
  learning_rate: 0.0003
  clip_range: 0.2
  n_steps: 4096
  randomize_start: true
  rail_limit: 2.0
  start_speed: 1.0
  continuous_actions: false
  reward_limit: 50.0
  max_episode_steps: 1000
