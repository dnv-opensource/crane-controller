# hybrid_cv01 + goal-tube reward, discrete (bang-bang) action space.
# goal_tube_reward=0.1 — smaller than continuous (0.5) to avoid bang-bang
# boundary exploitation. terminal_penalty=-5.0 unchanged.
# No early termination — episodes run to max_episode_steps or crash.
# This is the critical difference from the earlyt variants: the policy
# trains on full 1000-step episodes, ensuring it sees long-horizon
# recovery behavior needed for generalization to high start speeds.
reward:
  energy: 1.0
  positional: 0.0
  time: 0.0
  position: 0.1
  acceleration: 0.0
  terminal_penalty: -5.0
  goal_tube_reward: 0.1
  angle: 0.0
  angular_velocity: 0.0
  crane_velocity: -0.1
  crane_acceleration: 0.0
  angular_acceleration: 0.0
  t_min_crane: 0.0
training:
  steps: 3000000
  n_envs: 32
  gamma: 0.99
  save_path: models/hybrid_cv01_tube_disc_s42.zip
  seed: 42
  ent_coef: 0.0
  learning_rate: 0.0003
  clip_range: 0.2
  n_steps: 4096
  randomize_start: true
  rail_limit: 2.0
  start_speed: 1.0
  continuous_actions: false
  reward_limit: 50.0
  max_episode_steps: 1000
